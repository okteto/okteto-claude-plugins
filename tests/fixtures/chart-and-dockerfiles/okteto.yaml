# ---------------------------------------------------------------------------
# Okteto manifest
#
# In Okteto, `deploy:` describes how to provision the environment (services,
# images, helm charts, k8s manifests). `dev:` describes how to live-edit a
# running service — file sync, the dev image, the startup command. You can use
# Okteto with just `dev:` if you already have a way to deploy your stack, or
# have Okteto handle both.
#
# This file was generated by the `okteto-onboarding` skill from the signals it
# found in this repo (per-service Dockerfiles + a Helm chart + npm test
# scripts → Level 3, full lifecycle). It is a starting point — review and
# edit it to match your workflow before relying on it.
# ---------------------------------------------------------------------------

build:
  api:
    context: ./api
    dockerfile: Dockerfile  # using the existing Dockerfile under api/
  web:
    context: ./web
    dockerfile: Dockerfile  # using the existing Dockerfile under web/

deploy:
  # Discovered Helm chart at ./chart — `okteto deploy` will install/upgrade it.
  # Adjust values or add `-f values.<env>.yaml` if you have environment overlays.
  - name: Deploy Helm chart
    command: helm upgrade --install example ./chart

dev:
  api:
    image: okteto/node:20      # api/package.json declares engines.node = 20
    command: npm run dev       # api/package.json has scripts.dev (node --watch server.js)
    sync:
      - ./api:/usr/src/app     # full-service sync; tighten this if node_modules grows large
  web:
    image: okteto/node:20      # web/package.json declares engines.node = 20
    command: npm run dev       # web/package.json has scripts.dev (vite)
    sync:
      - ./web:/usr/src/app     # full-service sync; tighten this if node_modules grows large

test:
  # Level 3 — detected `npm test` in both package.json files.
  api:
    image: okteto/node:20
    context: ./api             # tests run against the api source tree
    commands:
      - npm ci
      - npm test               # api/package.json scripts.test = "node --test"
  web:
    image: okteto/node:20
    context: ./web
    commands:
      - npm ci
      - npm test               # web/package.json scripts.test = "vitest"
