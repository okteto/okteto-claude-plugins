# ---------------------------------------------------------------------------
# Okteto manifest
#
# In Okteto, `deploy:` describes how to provision the environment (services,
# images, helm charts, k8s manifests). `dev:` describes how to live-edit a
# running service — file sync, the dev image, the startup command. You can
# use Okteto with just `dev:` if you already have a way to deploy your stack,
# or have Okteto handle both.
#
# Generated by the okteto-onboarding skill. You are expected to review and
# edit this file — sync paths, dev image versions, and the startup command
# are common things to tighten up.
#
# Scope: Level 1 (dev-only).
# No Helm chart and no k8s manifests were detected in this repo, so higher
# levels (2 — deploy + dev, 3 — full lifecycle with tests) are unavailable.
# Bring your own deploy externally; `okteto up` will sync into a running pod.
# ---------------------------------------------------------------------------

dev:
  bare:                          # service name taken from pyproject.toml `project.name`
    image: okteto/python:3.12    # pyproject.toml declares requires-python = ">=3.12"
    command: bash                # no FastAPI/Flask signal detected; shell is the safe default for ad-hoc `python main.py`
    sync:
      - .:/usr/src/app           # full-repo sync; tighten this if you add large generated dirs (e.g. .venv, __pycache__)
