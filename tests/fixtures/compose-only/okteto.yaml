# In Okteto, `deploy:` describes how to provision the environment (services,
# images, helm charts, k8s manifests). `dev:` describes how to live-edit a
# running service — file sync, the dev image, the startup command. You can
# use Okteto with just `dev:` if you already have a way to deploy your stack,
# or have Okteto handle both.
#
# This file was generated by the `okteto-onboarding` skill. It is a starting
# point — review it, tighten the sync paths, and adjust the dev image and
# command to match how you actually run this service locally.
#
# Scope: Level 1 (dev-only). No Helm chart or k8s manifests were detected in
# the repo, so this manifest does not declare a `build:` or `deploy:` step.
# Bring up your stack however you do today (e.g., `docker compose up`), then
# run `okteto up api` to live-edit the `api` service against the cluster.

dev:
  api:
    image: okteto/golang:1.22  # go.mod declares Go 1.22
    command: bash               # Go services usually want a shell to `go run` manually
    sync:
      - ./api:/app              # matches the Dockerfile's WORKDIR; tighten this if you have large generated dirs
    environment:
      DEBUG: "true"             # carried over from docker-compose.yml
    forward:
      - 8080:8080               # carried over from docker-compose.yml ports
